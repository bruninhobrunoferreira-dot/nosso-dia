name: Deploy React Automatico

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './dia12/package-lock.json' # Aponta para o lock dentro da subpasta

      - name: Instalar Dependencias
        working-directory: ./dia12 # Entra na pasta do projeto
        run: npm ci

      - name: Criar Build do React
        working-directory: ./dia12 # Entra na pasta do projeto
        run: npm run build

      - name: Enviar Arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          # ATENÇÃO: Se usar Create React App, mude para './dia12/build'
          path: './dia12/dist' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


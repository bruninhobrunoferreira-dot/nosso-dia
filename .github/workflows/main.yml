name: Deploy React Automatico

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nosso-dia # DIZ AO ROBÔ PARA ENTRAR NA SUA PASTA REACT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './nosso-dia/package-lock.json'

      - name: Instalar Dependencias
        run: npm ci

      - name: Criar Build do React
        run: npm run build || npm run build-vite || true

      - name: Enviar Arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            ./nosso-dia/build
            ./nosso-dia/dist
            ./nosso-dia/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


